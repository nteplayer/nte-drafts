<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NTE - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo-area">Shiyu<span>Cup</span></div>
            <a href="dashboard.html" class="active">Home</a>
            <a href="profile.html">Profile</a>
            <a href="draft.html">Drafts</a>
            <a href="tournaments.html">Tournaments</a>
        </aside>

        <main class="main-content">
            <div class="content-header">
                <h2>Welcome, <span id="welcome-username" style="color: var(--accent-lime)">Player</span></h2>
            </div>

            <div class="content-card">
                <h3>Create New Roster</h3>
                
                <label>Select Cost System:</label>
                <select id="cost-system">
                    <option value="system1">Custom Cost Sys V1</option>
                </select>

                <label>Roster Name:</label>
                <input type="text" id="roster-name" placeholder="Enter custom roster name...">

                <label>Select 3 Slots (Constellations):</label>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <select id="slot1" onchange="calculateCost()"><option value="1">Constellation 1</option><option value="2">Constellation 2</option><option value="3">Constellation 3</option></select>
                    <select id="slot2" onchange="calculateCost()"><option value="1">Constellation 1</option><option value="2">Constellation 2</option><option value="3">Constellation 3</option></select>
                    <select id="slot3" onchange="calculateCost()"><option value="1">Constellation 1</option><option value="2">Constellation 2</option><option value="3">Constellation 3</option></select>
                </div>

                <div style="margin: 20px 0; font-size: 1.2rem;">
                    Total Cost: <strong id="total-cost" style="color: var(--accent-lime)">0</strong>
                </div>

                <button onclick="saveRoster()">Save Roster to Database</button>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        let currentUserId = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUserId = user.uid;
                db.ref('users/' + user.uid).once('value').then(snapshot => {
                    const data = snapshot.val();
                    if(data) document.getElementById('welcome-username').innerText = data.username;
                });
                calculateCost();
            } else {
                window.location.href = 'index.html';
            }
        });

        function calculateCost() {
            const s1 = parseInt(document.getElementById('slot1').value);
            const s2 = parseInt(document.getElementById('slot2').value);
            const s3 = parseInt(document.getElementById('slot3').value);
            // Простейшая калькуляция (можно изменить под реальные косты персонажей)
            document.getElementById('total-cost').innerText = s1 + s2 + s3;
        }

        function saveRoster() {
            const name = document.getElementById('roster-name').value.trim();
            const cost = document.getElementById('total-cost').innerText;
            const s1 = document.getElementById('slot1').value;
            const s2 = document.getElementById('slot2').value;
            const s3 = document.getElementById('slot3').value;

            if(!name) return alert('Please enter a roster name');

            db.ref('rosters/' + currentUserId).push({
                name: name,
                slots: [s1, s2, s3],
                totalCost: cost
            }).then(() => {
                alert('Roster saved successfully!');
                document.getElementById('roster-name').value = '';
            });
        }
    </script>
</body>
</html>
