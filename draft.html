<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drafts System (BO2)</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="draft-container">
        <nav class="nav-links">
            <a href="dashboard.html">Dashboard</a> | 
            <a href="draft.html"><b>Drafts Tab</b></a>
        </nav>

        <h2>Draft Matchmaking Room</h2>
        
        <label>Select Cost System:</label>
        <select id="draft-system-select"></select>

        <button onclick="startBO2()" style="background: #ff4545;">Start Best Of 2 (BO2) Match</button>

        <div class="draft-grid">
            <!-- Игрок 1 -->
            <div class="player-box">
                <h3>Player 1</h3>
                <input type="text" id="p1-nick" placeholder="Enter Player 1 Nickname">
                <button onclick="searchPlayerRosters(1)">Load Rosters</button>
                <select id="p1-rosters-select"></select>
                <div id="p1-fp" class="fp-status"></div>
            </div>

            <!-- Игрок 2 -->
            <div class="player-box">
                <h3>Player 2</h3>
                <input type="text" id="p2-nick" placeholder="Enter Player 2 Nickname">
                <button onclick="searchPlayerRosters(2)">Load Rosters</button>
                <select id="p2-rosters-select"></select>
                <div id="p2-fp" class="fp-status"></div>
            </div>
        </div>
        
        <div id="match-log" style="margin-top: 20px; font-weight: bold; text-align: center; color: var(--neon-cyan);"></div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/drafts.js"></script>
</body>
</html>
