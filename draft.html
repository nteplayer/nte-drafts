<div class="card">
    <select id="p1-select"></select> VS <select id="p2-select"></select>
    <label><input type="checkbox" id="bo2-check"> Best Of 2</label>
    <button onclick="startDraft()">Create Draft</button>
</div>
<script>
function startDraft() {
    const isBO2 = document.getElementById('bo2-check').checked;
    const p1 = document.getElementById('p1-select').value;
    const p2 = document.getElementById('p2-select').value;
    // Логика: если BO2, p1 FP в 1-й, p2 FP во 2-й
    firebase.database().ref('drafts').push({
        p1, p2, mode: isBO2 ? 'BO2' : 'BO1',
        fp_sequence: isBO2 ? [p1, p2] : [p1]
    });
}
</script>
