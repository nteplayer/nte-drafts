<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHIYU OUP PANEL - PROFILE</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div id="account-container"></div>
<div id="roster-container"></div>

<script>
const firebaseConfig = { /* ВСТАВЬ СЮДА СВОЙ РАБОЧИЙ КОНФИГ */ };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

firebase.auth().onAuthStateChanged(user => {
    if (!user) return window.location.href = "index.html";
    
    db.ref("users/" + user.uid).on("value", snapshot => {
        const userData = snapshot.val();
        if (!userData) return;

        // ЛОГИКА РЕНДЕРИНГА ВЕТКИ ACCOUNTS
        const accContainer = document.getElementById("account-container");
        accContainer.innerHTML = ""; // Очистка
        
        if (userData.accounts) {
            Object.keys(userData.accounts).forEach(accId => {
                const acc = userData.accounts[accId];
                // Создаем элементы вкладок и контента
                const tab = document.createElement("div");
                tab.innerText = acc.name || "Account";
                // ... (тут твоя логика создания кнопок управления агентами/движками)
                accContainer.appendChild(tab);
            });
        }
    });
});
</script>
</body>
</html>
