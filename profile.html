<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Dashboard</title>
    <style>
        :root {
            --bg-main: #0a0a0a;
            --bg-card: #141414;
            --bg-tab: #1f1f1f;
            --text-main: #ffffff;
            --text-muted: #757575;
            --accent-yellow: #e5fe02;
            --border-color: #222222;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: sans-serif;
            display: flex;
            min-height: 100vh;
        }

        /* ЛЕВАЯ ПАНЕЛЬ НАВИГАЦИИ (МЕНЮ) */
        .sidebar {
            width: 240px;
            background-color: #0c0c0c;
            border-right: 1px solid var(--border-color);
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }
        .sidebar-btn {
            background: #141414;
            color: #ffffff;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .sidebar-btn:hover {
            background: #1c1c1c;
        }
        .sidebar-btn.active {
            background-color: var(--accent-yellow);
            color: #000000;
        }

        /* ОСНОВНОЙ КОНТЕНТНЫЙ БЛОК */
        .main-content {
            flex-grow: 1;
            padding: 25px;
            max-width: 1100px;
        }

        /* ЭКРАНЫ ПРИЛОЖЕНИЯ */
        .app-screen {
            display: none;
        }
        .app-screen.active-screen {
            display: block;
        }

        /* ШАПКА */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .user-info-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar-placeholder {
            width: 45px;
            height: 45px;
            background: #2a2a2a;
            border-radius: 50%;
        }
        .user-names {
            display: flex;
            flex-direction: column;
        }
        .main-username {
            font-size: 1.1rem;
            font-weight: bold;
        }
        .sub-username {
            font-size: 0.8rem;
            color: var(--accent-yellow);
        }
        
        /* ПОИСК */
        .search-box { position: relative; }
        .search-trigger-btn {
            background: #141414;
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .dropdown {
            position: absolute;
            top: 40px; right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 280px;
            display: none;
            z-index: 100;
            padding: 12px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.5);
        }
        .dropdown input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            outline: none;
        }
        .dropdown input:focus { border-color: var(--accent-yellow); }
        #search-results-container { max-height: 200px; overflow-y: auto; }

        .back-btn {
            display: none;
            background: none;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        /* СУБ-ТАБЫ АККАУНТОВ И ПРЕСЕТОВ */
        .tabs-menu-container {
            background: #111111;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .tab-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .row-label {
            width: 120px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
            padding-right: 10px;
        }
        .tab-item {
            padding: 6px 14px;
            background: var(--bg-tab);
            border-radius: 15px;
            font-size: 0.85rem;
            cursor: pointer;
            color: #ccc;
            user-select: none;
        }
        .tab-item.active {
            background: var(--accent-yellow);
            color: #000;
            font-weight: bold;
        }
        .add-tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 5px;
        }

        /* РАБОЧАЯ ОБЛАСТЬ ПРОФИЛЯ */
        .workspace-box {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 20px;
        }
