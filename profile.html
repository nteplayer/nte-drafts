<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        :root {
            --bg-main: #0a0a0a;
            --bg-card: #141414;
            --bg-tab: #1f1f1f;
            --text-main: #ffffff;
            --text-muted: #757575;
            --accent-yellow: #e5fe02;
            --border-color: #222222;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: sans-serif;
            display: flex;
            min-height: 100vh;
        }

        /* БОКОВОЕ МЕНЮ НАВИГАЦИИ */
        .sidebar {
            width: 240px;
            background-color: #0c0c0c;
            border-right: 1px solid var(--border-color);
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }
        .sidebar-btn {
            background: #141414;
            color: #ffffff;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .sidebar-btn:hover {
            background: #1c1c1c;
        }
        .sidebar-btn.active {
            background-color: var(--accent-yellow);
            color: #000000;
        }

        /* ОСНОВНОЙ КОНТЕНЕР СТРАНИЦЫ */
        .main-content {
            flex-grow: 1;
            padding: 25px;
            max-width: 1100px;
        }

        /* ГЛАВНЫЕ ВКЛАДКИ НАВИГАЦИИ (ЭКРАНЫ) */
        .app-screen {
            display: none;
        }
        .app-screen.active-screen {
            display: block;
        }

        /* ШАПКА ПРОФИЛЯ */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .user-info-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar-placeholder {
            width: 45px;
            height: 45px;
            background: #2a2a2a;
            border-radius: 50%;
        }
        .user-names {
            display: flex;
            flex-direction: column;
        }
        .main-username {
            font-size: 1.1rem;
            font-weight: bold;
        }
        .sub-username {
            font-size: 0.8rem;
            color: var(--accent-yellow);
        }
        
        /* КНОПКА И ВЫПАДАЮЩЕЕ МЕНЮ ПОИСКА */
        .search-box { position: relative; }
        .search-trigger-btn {
            background: #141414;
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .dropdown {
            position: absolute;
            top: 40px; right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 280px;
            display: none;
            z-index: 100;
            padding: 12px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.5);
        }
        .dropdown input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            outline: none;
        }
        .dropdown input:focus {
            border-color: var(--accent-yellow);
        }
        #search-results-container {
            max-height: 200px;
            overflow-y: auto;
        }

        .back-btn {
            display: none;
            background: none;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        /* КОНТЕЙНЕР СУБ-ТАБОВ (Accounts / Presets) */
        .tabs-menu-container {
            background: #111111;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .tab-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .row-label {
            width: 120px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
            padding-right: 10px;
        }
        .tab-item {
            padding: 6px 14px;
            background: var(--bg-tab);
            border-radius: 15px;
            font-size: 0.85rem;
            cursor: pointer;
            color: #ccc;
            user-select: none;
        }
        .tab-item.active {
            background: var(--accent-yellow);
            color: #000;
            font-weight: bold;
        }
        .add-tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 5px;
        }

        /* РАБОЧАЯ ОБЛАСТЬ ПРОФИЛЯ */
        .workspace-box {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 20px;
        }
        .workspace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .title-with-edit {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
        }
        .edit-icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
        }
        .admin-panel-link {
            display: none;
            background: var(--accent-yellow);
            color: #000;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .info-section { margin-bottom: 20px; }
        .section-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .section-title { font-size: 1.1rem; font-weight: bold; }
        .manage-btn {
            background: #222;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .empty-placeholder-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            background: #1a1a1a;
            padding: 12px;
            border-radius: 6px;
            border: 1px dashed #333;
        }

        /* СТИЛИЗАЦИЯ СТРОКИ С НАЙДЕННЫМ ПОЛЬЗОВАТЕЛЕМ */
        .results-box-search {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border-color);
            color: #ffffff;
        }
        .results-box-search:hover { 
            background: #222222; 
        }
        
        /* ДЕМО СТИЛИ ДЛЯ ОСТАЛЬНЫХ ЭКРАНОВ */
        .placeholder-screen-box {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div class="sidebar">
    <button class="sidebar-btn" onclick="switchMainScreen('home', this)">Home</button>
    <button class="sidebar-btn active" onclick="switchMainScreen('profile', this)">Profile</button>
    <button class="sidebar-btn" onclick="switchMainScreen('drafts', this)">Drafts</button>
    <button class="sidebar-btn" onclick="switchMainScreen('tournaments', this)">Tournaments</button>
</div>

<div class="main-content">

    <div id="screen-home" class="app-screen">
        <div class="placeholder-screen-box">
