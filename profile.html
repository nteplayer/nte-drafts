<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        :root {
            --bg-main: #0a0a0a;
            --bg-card: #141414;
            --bg-tab: #1f1f1f;
            --text-main: #ffffff;
            --text-muted: #757575;
            --accent-yellow: #e5fe02;
            --border-color: #222222;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        /* Шапка профиля */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .user-info-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar-placeholder {
            width: 45px;
            height: 45px;
            background: #2a2a2a;
            border-radius: 50%;
        }
        .user-names {
            display: flex;
            flex-direction: column;
        }
        .main-username {
            font-size: 1.1rem;
            font-weight: bold;
        }
        .sub-username {
            font-size: 0.8rem;
            color: #e5fe02;
        }
        
        .search-box { position: relative; }
        .search-trigger-btn {
            background: #141414;
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .dropdown {
            position: absolute;
            top: 35px; right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 250px;
            display: none;
            z-index: 10;
            padding: 10px;
        }
        .dropdown input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .back-btn {
            display: none;
            background: none;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        /* Контейнер Табов (Две строки: Accounts и Presets) */
        .tabs-menu-container {
            background: #111111;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .tab-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .row-label {
            width: 120px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
            padding-right: 10px;
        }
        .tab-item {
            padding: 6px 14px;
            background: var(--bg-tab);
            border-radius: 15px;
            font-size: 0.85rem;
            cursor: pointer;
            color: #ccc;
            user-select: none;
        }
        .tab-item.active {
            background: var(--accent-yellow);
            color: #000;
            font-weight: bold;
        }
        .add-tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 5px;
        }

        /* Главная рабочая область */
        .workspace-box {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 20px;
        }
        .workspace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .title-with-edit {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
        }
        .edit-icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
        }
        .admin-panel-link {
            display: none;
            background: var(--accent-yellow);
            color: #000;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .info-section { margin-bottom: 20px; }
        .section-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .section-title { font-size: 1.1rem; font-weight: bold; }
