<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTE Tournaments - Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div class="profile-container">
        <nav class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="draft.html">Drafts</a>
            <a href="profile.html"><b>Profile</b></a>
            <a href="tournaments.html">Tournaments</a>
            <a href="news.html">News</a>
        </nav>

        <div class="profile-header">
            <div class="avatar-mock">NTE</div>
            <div>
                <h2><span id="profile-username">Loading...</span></h2>
                <p style="color: var(--text-muted); margin: 5px 0 0 0;" id="profile-email">email@database.com</p>
            </div>
        </div>

        <div class="profile-status-badge" id="profile-role">Standard Competitor</div>

        <h3>Your Saved Rosters</h3>
        <div id="my-rosters-list" class="rosters-grid">
            <p style="color: var(--text-muted);">Loading your tactical setups...</p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        auth.onAuthStateChanged(user => {
            if (user) {
                // 1. Загружаем инфо о пользователе
                db.ref('users/' + user.uid).once('value').then(snapshot => {
                    const data = snapshot.val();
                    if(data) {
                        document.getElementById('profile-username').innerText = data.username;
                        document.getElementById('profile-email').innerText = data.email;
                        if(data.isCostMaker) {
                            document.getElementById('profile-role').innerText = "★ Cost Maker / Tournament Admin";
                            document.getElementById('profile-role').style.borderColor = "var(--neon-purple)";
                            document.getElementById('profile-role').style.color = "var(--neon-purple)";
                        }
                    }
                });

                // 2. Загружаем только РОСТЕРЫ этого конкретного игрока
                db.ref('rosters/' + user.uid).on('value', snapshot => {
                    const rostersList = document.getElementById('my-rosters-list');
                    rostersList.innerHTML = '';
                    
                    if(!snapshot.exists()) {
                        rostersList.innerHTML = '<p style="color: var(--text-muted);">You haven\'t created any rosters yet. Go to Dashboard!</p>';
                        return;
                    }

                    snapshot.forEach(child => {
                        const roster = child.val();
                        rostersList.innerHTML += `
                            <div class="roster-card">
                                <h4>${roster.name}</h4>
                                <div class="roster-slots">
                                    <span class="slot-badge">C${roster.slots[0]}</span>
                                    <span class="slot-badge">C${roster.slots[1]}</span>
                                    <span class="slot-badge">C${roster.slots[2]}</span>
                                </div>
                                <div style="margin-top: 10px; font-size: 0.9rem;">
                                    System Cost: <strong style="color: var(--neon-cyan)">${roster.totalCost}</strong>
                                </div>
                            </div>
                        `;
                    });
                });
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
