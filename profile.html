auth.onAuthStateChanged(function(user) {

    const guestBadge = document.querySelector(".guest-badge");
    
    if (user) {
        // Если пользователь залогинен, просто прячем плашку гостя
        if (guestBadge) guestBadge.style.display = "none";
        
        // Загружаем данные профиля (тихо, без лишних сообщений на экран)
        db.ref("users/" + user.uid).once("value").then(function(snapshot) {
            const data = snapshot.val();
            if (data) {
                // Тут твой код заполнения полей профиля данными (username и т.д.)
            }
        });
    } else {
        // Если не залогинен, показываем плашку гостя
        if (guestBadge) guestBadge.style.display = "block";
    }
});
</script>
