<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiyuCup - Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .profile-subnav {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .profile-subnav button {
            background: transparent;
            color: var(--text-muted);
            width: auto;
            padding: 8px 16px;
            text-transform: none;
            font-weight: 500;
            letter-spacing: 0;
            border-radius: 6px;
        }
        .profile-subnav button.active-tab {
            background: rgba(212, 249, 0, 0.1);
            color: var(--accent-lime);
            font-weight: 700;
        }
        .profile-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
        }
        @media (max-width: 1000px) {
            .profile-grid { grid-template-columns: 1fr; }
        }
        .user-meta-box {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .user-avatar {
            width: 64px;
            height: 64px;
            background: #242836;
            border: 2px solid var(--accent-lime);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .badge-lime {
            display: inline-block;
            background: rgba(212, 249, 0, 0.1);
            color: var(--accent-lime);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 5px;
        }
        .search-results-box {
            margin-top: 15px;
            background: #0c0d12;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
        }
        .search-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            cursor: pointer;
        }
        .search-item:last-child { border-bottom: none; }
        .search-item:hover { color: var(--accent-lime); }

        .agents-grid .agent-slot:first-child {
            border: 1px solid var(--accent-lime);
            box-shadow: 0 0 10px rgba(212, 249, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo-area">Shiyu<span>Cup</span></div>
            <a href="dashboard.html">Home</a>
            <a href="profile.html" class="active">Profile</a>
            <a href="draft.html">Drafts</a>
            <a href="tournaments.html">Tournaments</a>
            <button class="sidebar-logout" onclick="logout()">Logout</button>
        </aside>

        <main class="main-content">
            <div class="content-header">
                <h2>Player Control Center</h2>
                <div>
                    <span style="color: var(--text-muted)">Viewing:</span> 
                    <span id="viewmode-badge" style="color: var(--accent-lime); font-weight: bold;">My Profile</span>
                </div>
            </div>

            <div class="profile-subnav">
                <button class="active-tab" id="btn-roster" onclick="switchProfileTab('roster')">Roster</button>
                <button id="btn-presets" onclick="switchProfileTab('presets')">Presets (Preset 1 / Preset 2)</button>
            </div>

            <div class="profile-grid">
                
                <div class="left-column">
                    <div class="content-card">
                        <div class="user-meta-box">
                            <div class="user-avatar" id="avatar-letters">NTE</div>
                            <div>
                                <h3 style="margin: 0;" id="profile-username">Loading...</h3>
                                <div class="badge-lime" id="profile-status">Account Verified</div>
                            </div>
                        </div>
                        <button id="back-to-my-profile" style="display:none; margin-top:15px; padding:8px 12px; width:auto; font-size:0.85rem;" onclick="loadMyProfile()">Back to my profile</button>
                    </div>

                    <div class="content-card" id="agents-section">
                        <h3 id="agents-title">Account Agents</h3>
                        <div class="agents-grid" id="agents-display-grid">
                            <div class="agent-slot"></div>
                            <div class="agent-slot"></div>
                            <div class="agent-slot"></div>
                            <div class="agent-slot"></div>
                            <div class="agent-slot"></div>
                            <div class="agent-slot"></div>
                            <div class="agent-slot"></div>
                            <div class="agent-slot"></div>
                            <div class="agent-slot"></div>
                            <div class="agent-slot"></div>
                        </div>
                    </div>

                    <div class="content-card">
                        <h3>Linked Game Accounts</h3>
                        <table class="tournament-table">
                            <thead>
                                <tr>
                                    <th>Account Label</th>
                                    <th>In-Game UID / Name</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><b>Main Account</b></td>
                                    <td id="table-uid">—</td>
                                    <td style="color: var(--accent-lime)">Primary</td>
                                </tr>
                                <tr>
                                    <td>Account 2</td>
                                    <td>—</td>
                                    <td style="color: var(--text-muted)">Backup</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="right-column">
                    
                    <div class="content-card">
                        <h3>Search User</h3>
                        <input type="text" id="search-input" placeholder="Enter exact username...">
                        <button style="padding: 10px;" onclick="searchUser()">Search DB</button>
                        
                        <div id="search-results" class="search-results-box" style="display: none;"></div>
                    </div>

                    <div class="content-card">
                        <h3>Calculate Costs</h3>
                        <div style="font-size: 1.5rem; font-weight: bold; margin: 15px 0; color: var(--accent-lime)">
                            Cost: <span id="calc-cost-display">0</span>
                        </div>
                        <button style="padding: 10px;" onclick="
