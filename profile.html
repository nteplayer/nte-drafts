<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NTE - Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo-area">Shiyu<span>Cup</span></div>
            <a href="dashboard.html">Home</a>
            <a href="profile.html" class="active">Profile</a>
            <a href="draft.html">Drafts</a>
            <a href="tournaments.html">Tournaments</a>
        </aside>

        <main class="main-content">
            <div class="content-header">
                <h2>User Profile</h2>
                <div>
                    <span id="user-display" style="font-weight:bold; color:var(--accent-lime)">Loading...</span>
                </div>
            </div>

            <div class="content-card">
                <h3>Account Agents (38)</h3>
                <div class="agents-grid">
                    <div class="agent-slot" style="border-color: var(--accent-lime); color:#fff">M3</div>
                    <div class="agent-slot">M0</div>
                    <div class="agent-slot">M0</div>
                    <div class="agent-slot">M6</div>
                    <div class="agent-slot">M2</div>
                    <div class="agent-slot">M1</div>
                    <div class="agent-slot">M0</div>
                    <div class="agent-slot">M3</div>
                    <div class="agent-slot">M0</div>
                    <div class="agent-slot">M6</div>
                </div>
            </div>

            <div class="content-card">
                <h3>Account Engines (0)</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem;">No supernatural engines configured yet.</p>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).once('value').then(snapshot => {
                    const data = snapshot.val();
                    if(data) document.getElementById('user-display').innerText = data.username;
                });
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
