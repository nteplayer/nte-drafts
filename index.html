<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Draft Platform</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    body {
      background: #050505;
      color: white;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: #222;
      border-radius: 999px;
    }

    .sidebar-btn {
      transition: 0.2s;
    }

    .sidebar-btn:hover {
      transform: scale(1.02);
    }

    .card {
      background: #0f0f0f;
      border: 1px solid #222;
      border-radius: 24px;
    }

  </style>

</head>

<body>

  <div class="flex h-screen">

    <!-- SIDEBAR -->

    <aside class="w-[230px] border-r border-zinc-900 p-4 flex flex-col bg-black">

      <!-- LOGO -->

      <div class="mb-6">

        <div class="text-3xl font-black tracking-wider text-lime-300">
          DRAFT
        </div>

        <div class="text-zinc-500 text-sm">
          Tournament Platform
        </div>

      </div>

      <!-- NAVIGATION -->

      <div class="flex flex-col gap-3">

        <button
          data-page="home"
          class="sidebar-btn rounded-full bg-lime-300 text-black py-4 font-black text-lg"
        >
          Home
        </button>

        <button
          data-page="profile"
          class="sidebar-btn rounded-full border border-zinc-800 bg-zinc-950 py-4 font-black text-lg"
        >
          Profile
        </button>

        <button
          data-page="drafts"
          class="sidebar-btn rounded-full border border-zinc-800 bg-zinc-950 py-4 font-black text-lg"
        >
          Drafts
        </button>

        <button
          data-page="tournaments"
          class="sidebar-btn rounded-full border border-zinc-800 bg-zinc-950 py-4 font-black text-lg"
        >
          Tournaments
        </button>

        <button
          data-page="systems"
          class="sidebar-btn rounded-full border border-zinc-800 bg-zinc-950 py-4 font-black text-lg"
        >
          Draft Systems
        </button>

        <button
          data-page="news"
          class="sidebar-btn rounded-full border border-zinc-800 bg-zinc-950 py-4 font-black text-lg"
        >
          News
        </button>

      </div>

      <!-- BOTTOM -->

      <div class="mt-auto pt-6">

        <div class="rounded-3xl border border-zinc-800 bg-zinc-950 p-4">

          <div class="text-lime-300 font-black text-xl mb-2">
            SHIYU CUP
          </div>

          <div class="text-zinc-500 text-sm mb-4">
            Draft Tournament System
          </div>

          <button class="w-full rounded-full bg-lime-300 text-black py-3 font-black">
            Open
          </button>

        </div>

      </div>

    </aside>

    <!-- MAIN -->

    <main class="flex-1 overflow-y-auto p-6">

      <div class="card p-10">

        <h1 class="text-6xl font-black mb-5">
          Home
        </h1>

        <div class="text-zinc-500 text-xl">
          Welcome to Draft Platform
        </div>

      </div>

    </main>

  </div>

  <!-- CREATE DRAFT MODAL -->

  <div
    id="draftModal"
    class="hidden fixed inset-0 bg-black/80 z-50 items-center justify-center p-10"
  >

    <div class="w-full max-w-[1400px] rounded-[30px] bg-[#0b0b0b] border border-zinc-800 p-8">

      <div class="flex items-center justify-between mb-10">

        <h2 class="text-4xl font-black">
          Create Draft
        </h2>

        <button
          onclick="closeDraftModal()"
          class="text-2xl"
        >
          ✕
        </button>

      </div>

      <div class="flex items-center gap-5 mb-10">

        <select class="bg-zinc-950 border border-zinc-700 rounded-full px-5 py-3">

          <option>
            Draft System
          </option>

        </select>

        <label class="flex items-center gap-3">

          <span>Best Of 2</span>

          <input type="checkbox" />

        </label>

      </div>

      <div class="grid grid-cols-3 gap-10">

        <!-- PLAYER 1 -->

        <div>

          <input
            type="text"
            placeholder="Player 1 nickname"
            class="w-full rounded-full bg-zinc-950 border border-zinc-700 px-5 py-4 mb-5"
          />

          <div class="card p-5">

            <div class="text-2xl font-black mb-5">
              Player 1 Roster
            </div>

            <div class="grid grid-cols-4 gap-3">

              <div class="h-[90px] rounded-2xl bg-zinc-900 border border-zinc-800"></div>
              <div class="h-[90px] rounded-2xl bg-zinc-900 border border-zinc-800"></div>
              <div class="h-[90px] rounded-2xl bg-zinc-900 border border-zinc-800"></div>
              <div class="h-[90px] rounded-2xl bg-zinc-900 border border-zinc-800"></div>

            </div>

          </div>

        </div>

        <!-- VS -->

        <div class="flex items-center justify-center text-6xl font-black text-lime-300">

          VS

        </div>

        <!-- PLAYER 2 -->

        <div>

          <input
            type="text"
            placeholder="Player 2 nickname"
            class="w-full rounded-full bg-zinc-950 border border-zinc-700 px-5 py-4 mb-5"
          />

          <div class="card p-5">

            <div class="text-2xl font-black mb-5">
              Player 2 Roster
            </div>

            <div class="grid grid-cols-4 gap-3">

              <div class="h-[90px] rounded-2xl bg-zinc-900 border border-zinc-800"></div>
              <div class="h-[90px] rounded-2xl bg-zinc-900 border border-zinc-800"></div>
              <div class="h-[90px] rounded-2xl bg-zinc-900 border border-zinc-800"></div>
              <div class="h-[90px] rounded-2xl bg-zinc-900 border border-zinc-800"></div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- AUTH MODAL -->

  <div
    id="authModal"
    class="fixed inset-0 bg-black flex items-center justify-center z-[999]"
  >

    <div class="w-full max-w-[450px] rounded-[30px] border border-zinc-800 bg-[#0b0b0b] p-8">

      <h1 class="text-5xl font-black mb-8 text-center">
        LOGIN
      </h1>

      <input
        id="email"
        type="email"
        placeholder="Email"
        class="w-full rounded-2xl bg-zinc-950 border border-zinc-800 px-5 py-4 mb-4 outline-none"
      />

      <input
        id="password"
        type="password"
        placeholder="Password"
        class="w-full rounded-2xl bg-zinc-950 border border-zinc-800 px-5 py-4 mb-6 outline-none"
      />

      <div class="flex gap-4">

        <button
          id="loginBtn"
          class="flex-1 rounded-2xl bg-lime-300 text-black py-4 font-black"
        >
          LOGIN
        </button>

        <button
          id="registerBtn"
          class="flex-1 rounded-2xl border border-zinc-700 py-4 font-black"
        >
          REGISTER
        </button>

      </div>

      <div
        id="authStatus"
        class="mt-5 text-center text-zinc-500"
      ></div>

    </div>

  </div>

  <script type="module">

import {
  auth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from './firebase.js'

/* =========================
   AUTH
========================= */

const authModal = document.getElementById('authModal')

const emailInput = document.getElementById('email')

const passwordInput = document.getElementById('password')

const authStatus = document.getElementById('authStatus')

const loginBtn = document.getElementById('loginBtn')

const registerBtn = document.getElementById('registerBtn')

/* REGISTER */

registerBtn.addEventListener('click', async () => {

  const email = emailInput.value.trim()

  const password = passwordInput.value.trim()

  if (!email || !password) {

    authStatus.innerHTML = 'Enter email and password'

    return

  }

  try {

    await createUserWithEmailAndPassword(
      auth,
      email,
      password
    )

    authStatus.innerHTML = 'Account created'

  } catch(error) {

    authStatus.innerHTML = error.message

  }

})

/* LOGIN */

loginBtn.addEventListener('click', async () => {

  const email = emailInput.value.trim()

  const password = passwordInput.value.trim()

  if (!email || !password) {

    authStatus.innerHTML = 'Enter email and password'

    return

  }

  try {

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    )

    authStatus.innerHTML = 'Success login'

  } catch(error) {

    authStatus.innerHTML = error.message

  }

})

/* AUTH STATE */

onAuthStateChanged(auth, (user) => {

  if(user) {

    authModal.style.display = 'none'

    console.log('USER LOGGED')

  } else {

    authModal.style.display = 'flex'

  }

})

/* =========================
   DRAFT MODAL
========================= */

window.openDraftModal = function() {

  const modal = document.getElementById('draftModal')

  modal.classList.remove('hidden')

  modal.classList.add('flex')

}

window.closeDraftModal = function() {

  const modal = document.getElementById('draftModal')

  modal.classList.add('hidden')

  modal.classList.remove('flex')

}

/* =========================
   PAGES
========================= */

const main = document.querySelector('main')

const pages = {

  home: `
    <div class="card p-10">

      <h1 class="text-6xl font-black mb-5">
        Home
      </h1>

      <div class="text-zinc-500 text-xl">
        Welcome to Draft Platform
      </div>

    </div>
  `,

  profile: `
    <div class="card p-10">

      <h1 class="text-6xl font-black mb-8">
        Profile
      </h1>

      <div class="flex gap-4 mb-8">

        <button class="rounded-full bg-lime-300 text-black px-5 py-3 font-black">
          Main Account
        </button>

        <button class="rounded-full border border-zinc-700 px-5 py-3">
          Tournament
        </button>

        <button class="rounded-full border border-zinc-700 px-5 py-3">
          +
        </button>

      </div>

      <div class="grid grid-cols-6 gap-4">

        <div class="h-[120px] rounded-3xl bg-zinc-900 border border-zinc-800"></div>
        <div class="h-[120px] rounded-3xl bg-zinc-900 border border-zinc-800"></div>
        <div class="h-[120px] rounded-3xl bg-zinc-900 border border-zinc-800"></div>
        <div class="h-[120px] rounded-3xl bg-zinc-900 border border-zinc-800"></div>
        <div class="h-[120px] rounded-3xl bg-zinc-900 border border-zinc-800"></div>
        <div class="h-[120px] rounded-3xl bg-zinc-900 border border-zinc-800"></div>

      </div>

    </div>
  `,

  drafts: `
    <div class="card p-10">

      <div class="flex items-center justify-between mb-8">

        <h1 class="text-6xl font-black">
          Drafts
        </h1>

        <button
          onclick="openDraftModal()"
          class="rounded-full bg-lime-300 text-black px-6 py-3 font-black"
        >
          Create Draft
        </button>

      </div>

      <div class="text-zinc-500 text-xl">
        Drafts not found
      </div>

    </div>
  `,

  tournaments: `
    <div class="card p-10">

      <h1 class="text-6xl font-black mb-8">
        Tournaments
      </h1>

      <div class="text-zinc-500 text-xl">
        Tournament list
      </div>

    </div>
  `,

  systems: `
    <div class="card p-10">

      <div class="flex items-center justify-between mb-8">

        <h1 class="text-6xl font-black">
          Draft Systems
        </h1>

        <button class="rounded-full bg-lime-300 text-black px-6 py-3 font-black">
          Create Draft System
        </button>

      </div>

      <div class="text-zinc-500 text-xl">
        Systems list
      </div>

    </div>
  `,

  news: `
    <div class="card p-10">

      <h1 class="text-6xl font-black mb-8">
        News
      </h1>

      <div class="text-zinc-500 text-xl">
        No news yet
      </div>

    </div>
  `

}

/* =========================
   PAGE SWITCH
========================= */

function setPage(page) {

  main.innerHTML = pages[page]

  document.querySelectorAll('.sidebar-btn').forEach(btn => {

    btn.classList.remove(
      'bg-lime-300',
      'text-black'
    )

    btn.classList.add(
      'bg-zinc-950',
      'text-white'
    )

  })

  const activeBtn = document.querySelector(
    `[data-page="${page}"]`
  )

  if(activeBtn) {

    activeBtn.classList.remove(
      'bg-zinc-950',
      'text-white'
    )

    activeBtn.classList.add(
      'bg-lime-300',
      'text-black'
    )

  }

}

/* =========================
   SIDEBAR BUTTONS
========================= */

document.querySelectorAll('.sidebar-btn').forEach(btn => {

  btn.addEventListener('click', () => {

    setPage(btn.dataset.page)

  })

})

</script>
  
</body>
</html>
