<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShiyuCup - Tournaments</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo-area">Shiyu<span>Cup</span></div>
            <a href="dashboard.html">Home</a>
            <a href="profile.html">Profile</a>
            <a href="draft.html">Drafts</a>
            <a href="tournaments.html" class="active">Tournaments</a>
            <button class="sidebar-logout" onclick="logout()">Logout</button>
        </aside>

        <main class="main-content">
            <div class="content-header">
                <h2>Tournament Schedules</h2>
            </div>
            
            <div class="content-card">
                <table class="tournament-table">
                    <thead>
                        <tr>
                            <th>Event Name</th>
                            <th>Format System</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><b>Urban Shadows Invitational</b></td>
                            <td>BO2 Double Rotation</td>
                            <td><span style="color:var(--accent-lime); font-weight: bold;">LIVE</span></td>
                        </tr>
                        <tr>
                            <td><b>Everness Rookie Cup</b></td>
                            <td>BO1 Elimination</td>
                            <td style="color: var(--text-muted)">UPCOMING</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
